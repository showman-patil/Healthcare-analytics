kind = "web"
previewPath = "/"
title = "Healthcare Analytics & Disease Prediction"
version = "1.0.0"
id = "artifacts/healthcare-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18673

[services.development]
run = "pnpm --filter @workspace/healthcare-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthcare-dashboard", "run", "build" ]
publicDir = "artifacts/healthcare-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18673"
BASE_PATH = "/"
